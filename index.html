<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Queens</title>
    
    <style>
        /* General Styles */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            background: #f8f1ff;
            color: #333;
        }

        header {
            background: #9f8bc9;
            color: white;
            text-align: center;
            padding: 50px 20px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        header h1 {
            margin: 0;
            font-size: 3em;
        }

        header p {
            font-size: 1.2em;
        }

        /* Queen Container */
        .queen-container {
            display: flex;
            flex-direction: column;
            gap: 50px;
            padding: 50px 20px;
            max-width: 1000px;
            margin: auto;
        }

        /* Queen Card */
        .queen-card {
            display: flex;
            align-items: center;
            gap: 30px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .queen-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(122, 60, 255, 0.3);
        }

        .queen-card img {
            width: 250px;
            border-radius: 15px;
            object-fit: cover;
        }

        /* Description */
        .queen-desc h2 {
            margin: 0 0 10px 0;
            color: #7a3cff;
        }

        .queen-desc p {
            margin: 0;
            font-size: 1.1em;
            line-height: 1.5;
        }

        /* Alternate Layout */
        .queen-card.right {
            flex-direction: row-reverse;
        }

        .queen-card.left {
            flex-direction: row;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            background: #222;
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .queen-card {
                flex-direction: column !important;
                text-align: center;
            }

            .queen-card img {
                width: 80%;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Hall of Queens</h1>
    <p>Queens of all time 👑</p>
</header>

<main class="queen-container">

    <!-- Susie Haltmann -->
    <div class="queen-card right">
        <img src="susie.jpg" alt="Susie Haltmann">
        <div class="queen-desc">
            <h2>Susie Haltmann</h2>
            <p>THE queen of all time, creator of mecha knight+ </p>
        </div>
    </div>

    <!-- Ada Wong -->
    <div class="queen-card left">
        <img src="ada.jpg" alt="Ada Wong">
        <div class="queen-desc">
            <h2>Ada Wong</h2>
            <p>Leon is nothing without her. DUH..</p>
        </div>
    </div>

    <!-- Sherry -->
    <div class="queen-card right">
        <img src="sherry.jpg" alt="Sherry">
        <div class="queen-desc">
            <h2>Sherry Birkin</h2>
            <p>Better than ashley :]</p>
        </div>
    </div>

    <!-- Grace Ashcroft -->
    <div class="queen-card left">
        <img src="grace.jpg" alt="Grace Ashcroft">
        <div class="queen-desc">
            <h2>Grace Ashcroft</h2>
            <p>holy perfection</p>
        </div>
</div>
        <div class="queen-card right">
    <img src="milly.jpg" alt="milly">
    <div class="queen-desc">
        <h2>Honorable Mention: Milly</h2>
        <p>Queen of cats, does NOT work at Mcdonalds</p>
    </div>

        
    </div>

</main>

<footer>
    <p>yes</p>
</footer>

</body>
</html>
